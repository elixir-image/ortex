name: Test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  linux:
    runs-on: ubuntu-latest
    name: Linux ${{ matrix.elixir }}, ${{ matrix.otp }}
    strategy:
      matrix:
        elixir: ["1.17.3"]
        otp: ["27.1.2"]
    env:
      MIX_ENV: test
      # Force source build. CI validates the source path end-to-end;
      # precompiled artifacts are exercised separately in release.yml.
      ORTEX_BUILD: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
      - name: Install dependencies
        run: mix deps.get
      - name: Compile and check warnings
        run: mix compile --warnings-as-errors
      - name: Check formatting
        run: mix format --check-formatted
      - name: Run tests
        run: mix test

  macos:
    runs-on: macos-latest
    name: macOS
    env:
      MIX_ENV: test
      # Force source build. CI validates the source path end-to-end;
      # precompiled artifacts are exercised separately in release.yml.
      ORTEX_BUILD: "true"
    steps:
      - uses: actions/checkout@v6
      - name: Install
        run: |
          brew update
          brew install erlang@27 elixir
      - name: Install dependencies
        run: mix deps.get
      - name: Compile and check warnings
        run: mix compile --warnings-as-errors
      - name: Check formatting
        run: mix format --check-formatted
      - name: Run tests
        run: mix test
